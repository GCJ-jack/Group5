<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史交易记录</title>
    <!-- 引入 Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 图标 (CDN) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 引入自定义 CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-gray-800">

<!-- 顶部导航 -->
<nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <i class="fas fa-chart-line text-blue-600 text-2xl mr-3"></i>
                <span class="font-bold text-xl tracking-tight">投资交易看板</span>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-gray-500">数据源: MySQL</span>
                <button id="refreshBtn" class="text-blue-600 hover:text-blue-800 text-sm font-medium">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- 主要内容 -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

    <!-- 统计卡片 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="glass-effect p-6 rounded-xl shadow-sm border border-gray-100">
            <div class="text-gray-500 text-sm mb-1">总交易笔数</div>
            <div class="text-3xl font-bold text-gray-800" id="totalCount">0</div>
        </div>
        <div class="glass-effect p-6 rounded-xl shadow-sm border border-gray-100">
            <div class="text-gray-500 text-sm mb-1">买入次数</div>
            <div class="text-3xl font-bold text-green-600" id="buyCount">0</div>
        </div>
        <div class="glass-effect p-6 rounded-xl shadow-sm border border-gray-100">
            <div class="text-gray-500 text-sm mb-1">卖出次数</div>
            <div class="text-3xl font-bold text-red-500" id="sellCount">0</div>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="glass-effect rounded-xl shadow-lg overflow-hidden border border-gray-100">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 class="font-bold text-lg text-gray-700">交易明细</h3>
            <span class="text-xs text-gray-400 bg-white px-2 py-1 rounded border">实时更新</span>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="text-xs text-gray-500 uppercase bg-gray-50 border-b border-gray-200">
                    <th class="px-6 py-4 font-semibold">交易时间</th>
                    <th class="px-6 py-4 font-semibold">标的名称</th>
                    <th class="px-6 py-4 font-semibold">代码</th>
                    <th class="px-6 py-4 font-semibold text-center">类型</th>
                    <th class="px-6 py-4 font-semibold text-right">成交价格</th>
                    <th class="px-6 py-4 font-semibold text-right">数量</th>
                    <th class="px-6 py-4 font-semibold text-right">总金额</th>
                </tr>
                </thead>
                <tbody id="recordTableBody" class="text-sm divide-y divide-gray-100">
                <!-- 数据将通过 JS 插入这里 -->
                </tbody>
            </table>
        </div>
        <!-- 空状态提示 -->
        <div id="emptyState" class="hidden p-10 text-center text-gray-400">
            <i class="fas fa-inbox text-4xl mb-3"></i>
            <p>暂无交易记录</p>
        </div>
    </div>
</main>

<!-- 引入自定义 JS -->
<script src="js/main.js"></script>
</body>
</html>
