<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #1e1e2f;
            color: white;
            padding: 24px 20px;
            box-sizing: border-box;
        }

        .sidebar h2 {
            margin: 0;
            font-size: 26px;
        }

        .main {
            flex: 1;
            padding: 24px;
            box-sizing: border-box;
        }

        .card {
            background: white;
            padding: 24px;
            margin-bottom: 24px;
            border-radius: 12px;
            box-sizing: border-box;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
        }

        #total {
            font-size: 34px;
            font-weight: bold;
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            padding: 14px 12px;
            border-bottom: 1px solid #e5e5e5;
            text-align: left;
            vertical-align: middle;
            word-wrap: break-word;
        }

        th {
            font-size: 16px;
            font-weight: 700;
        }

        td {
            font-size: 15px;
        }

        .action-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-input {
            width: 110px;
            padding: 8px 10px;
            box-sizing: border-box;
        }

        .sell-btn {
            background: orange;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 14px;
        }

        .sell-btn:hover {
            opacity: 0.9;
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .form-input {
            width: 220px;
            padding: 10px 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .add-btn {
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 15px;
        }

        .add-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>Portfolio</h2>
    </div>

    <div class="main">

        <div class="card">
            <h3>Total Balance</h3>
            <p id="total">$0</p>
        </div>

        <div class="card">
            <h3>Holdings</h3>

            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Ticker</th>
                    <th>Type</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Time</th>
                    <th>Total Value</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>Add Asset</h3>
            <div class="form-row">
                <input id="ticker" class="form-input" type="text" placeholder="Ticker (e.g. AAPL)">
                <input id="quantity" class="form-input" type="number" placeholder="Quantity" min="1" step="1">
                <button class="add-btn" onclick="addAsset()">Add</button>
            </div>
        </div>

    </div>
</div>

<script>
    const API = "http://localhost:8080";

    function formatTime(time) {
        if (!time) return "-";
        return time.replace("T", " ").substring(0, 19);
    }

    function formatMoney(value) {
        return "$" + Number(value).toFixed(2);
    }

    function isPositiveInteger(value) {
        return Number.isInteger(value) && value > 0;
    }

    async function loadPortfolio() {
        try {
            const res = await fetch(API + "/portfolio");
            if (!res.ok) {
                throw new Error("Failed to load portfolio");
            }

            const data = await res.json();
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";

            data.forEach(item => {
                const row = `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.ticker}</td>
                        <td>${item.type}</td>
                        <td>${item.quantity}</td>
                        <td>${formatMoney(item.price)}</td>
                        <td>${formatTime(item.time)}</td>
                        <td>${formatMoney(item.totalValue)}</td>
                        <td>
                            <div class="action-cell">
                                <input
                                    class="action-input"
                                    type="number"
                                    id="sell-${item.id}"
                                    placeholder="qty"
                                    min="1"
                                    max="${item.quantity}"
                                    step="1"
                                >
                                <button class="sell-btn" onclick="sellAsset(${item.id}, ${item.quantity})">Sell</button>
                            </div>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            loadTotal();
        } catch (error) {
            console.error(error);
            alert("Failed to load portfolio data.");
        }
    }

    async function loadTotal() {
        try {
            const res = await fetch(API + "/portfolio/value");
            if (!res.ok) {
                throw new Error("Failed to load total value");
            }

            const total = await res.text();
            document.getElementById("total").innerText = formatMoney(total);
        } catch (error) {
            console.error(error);
            alert("Failed to load total balance.");
        }
    }

    async function addAsset() {
        const tickerInput = document.getElementById("ticker");
        const quantityInput = document.getElementById("quantity");

        const ticker = tickerInput.value.trim().toUpperCase();
        const quantity = Number(quantityInput.value);

        if (!ticker) {
            alert("Please enter a ticker.");
            return;
        }

        if (!isPositiveInteger(quantity)) {
            alert("Quantity must be a positive integer.");
            return;
        }

        try {
            const res = await fetch(API + "/portfolio", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    ticker: ticker,
                    quantity: quantity
                })
            });

            if (!res.ok) {
                const message = await res.text();
                throw new Error(message || "Add asset failed");
            }

            tickerInput.value = "";
            quantityInput.value = "";
            loadPortfolio();
        } catch (error) {
            console.error(error);
            alert(error.message || "Failed to add asset.");
        }
    }

    async function sellAsset(id, currentQuantity) {
        const sellInput = document.getElementById("sell-" + id);
        const sellQuantity = Number(sellInput.value);

        if (!isPositiveInteger(sellQuantity)) {
            alert("Sell quantity must be a positive integer.");
            return;
        }

        if (sellQuantity > currentQuantity) {
            alert("Sell quantity cannot be greater than current holdings.");
            return;
        }

        try {
            const res = await fetch(API + "/portfolio/sell", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    id: id,
                    quantity: sellQuantity
                })
            });

            if (!res.ok) {
                const message = await res.text();
                throw new Error(message || "Sell asset failed");
            }

            loadPortfolio();
        } catch (error) {
            console.error(error);
            alert(error.message || "Failed to sell asset.");
        }
    }

    loadPortfolio();
</script>

</body>
</html>
