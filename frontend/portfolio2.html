<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .chart-card {
            padding: 20px;
        }

        .chart-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 24px;
        }

        .chart-box {
            width: 180px;
            height: 180px;
        }

        .legend {
            min-width: 180px;
            padding-right: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .legend-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 90px;
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .chart-spacer {
            flex: 1;
        }

        .sidebar {
            width: 220px;
            background: #1e1e2f;
            color: white;
            padding: 24px 20px;
            box-sizing: border-box;
        }

        .sidebar h2 {
            margin: 0;
            font-size: 26px;
        }

        .main {
            flex: 1;
            padding: 24px;
            box-sizing: border-box;
        }

        .card {
            background: white;
            padding: 24px;
            margin-bottom: 24px;
            border-radius: 12px;
            box-sizing: border-box;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
        }

        #total {
            font-size: 34px;
            font-weight: bold;
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            padding: 14px 12px;
            border-bottom: 1px solid #e5e5e5;
            text-align: left;
            vertical-align: middle;
            word-wrap: break-word;
        }

        th {
            font-size: 16px;
            font-weight: 700;
        }

        td {
            font-size: 15px;
        }

        .action-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-input {
            width: 110px;
            padding: 8px 10px;
            box-sizing: border-box;
        }

        .sell-btn {
            background: orange;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 14px;
        }

        .sell-btn:hover {
            opacity: 0.9;
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .form-input {
            width: 220px;
            padding: 10px 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .add-btn {
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 15px;
        }

        .add-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>Portfolio</h2>
    </div>

    <div class="main">

        <div class="card">
            <h3>Total Balance</h3>
            <p id="total">$0</p>
        </div>

        <div class="card">
            <h3>Holdings</h3>

            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Ticker</th>
                    <th>Type</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Time</th>
                    <th>Total Value</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="card">
            <div class="card chart-card">
                <h3>Portfolio Composition</h3>

                <div class="chart-wrapper">
                    <div class="legend" id="legend"></div>

                    <div class="chart-box">
                        <canvas id="chart"></canvas>
                    </div>

                    <div class="chart-spacer" aria-hidden="true"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Add Asset</h3>
            <div class="form-row">
                <input id="ticker" class="form-input" type="text" 
                placeholder="Ticker (e.g. AAPL)" oninput="searchTicker()" autocomplete="off">
                <div id="suggestions" style="background:white;border:1px solid #ccc;width:220px;"></div>
                <input id="quantity" class="form-input" type="number" placeholder="Quantity" min="1" step="1">
                <select id="type" class="form-input">
                    <option value="">Select type</option>
                    <option value="Equity">Equity</option>
                    <option value="Crypto">Crypto</option>
                    <option value="ETF">ETF</option>
                    <option value="Bond">Bond</option>
                    <option value="Cash">Cash</option>
                </select>
                <button class="add-btn" onclick="addAsset()">Add</button>
            </div>
        </div>

    </div>
</div>

<script>
    const API = "http://localhost:8080";

    function formatTime(time) {
        if (!time) return "-";
        return time.replace("T", " ").substring(0, 19);
    }

    function formatMoney(value) {
        return "$" + Number(value).toFixed(2);
    }

    function isPositiveInteger(value) {
        return Number.isInteger(value) && value > 0;
    }

    async function loadPortfolio() {
        try {
            const res = await fetch(API + "/portfolio");
            if (!res.ok) {
                throw new Error("Failed to load portfolio");
            }

            const data = await res.json();
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";

            let composition = {};   // ⭐ 图表统计

            data.forEach(item => {

                const row = `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.ticker}</td>
                        <td>${item.type}</td>
                        <td>${item.quantity}</td>
                        <td>${formatMoney(item.price)}</td>
                        <td>${formatTime(item.time)}</td>
                        <td>${formatMoney(item.totalValue)}</td>
                        <td>
                            <div class="action-cell">
                                <input
                                    class="action-input"
                                    type="number"
                                    id="sell-${item.id}"
                                    placeholder="qty"
                                    min="1"
                                    max="${item.quantity}"
                                    step="1"
                                >
                                <button class="sell-btn" onclick="sellAsset(${item.id}, ${item.quantity})">Sell</button>
                            </div>
                        </td>
                    </tr>
                `;

                tbody.innerHTML += row;

                // ⭐ 统计每个 type 的总 value
                let type = item.type || "Unknown";
                composition[type] = (composition[type] || 0) + item.totalValue;
            });

            loadTotal();

            // ⭐ 画图
            drawChart(composition);

        } catch (error) {
            console.error(error);
            alert("Failed to load portfolio data.");
        }
    }

    async function loadTotal() {
        try {
            const res = await fetch(API + "/portfolio/value");
            if (!res.ok) {
                throw new Error("Failed to load total value");
            }

            const total = await res.text();
            document.getElementById("total").innerText = formatMoney(total);
        } catch (error) {
            console.error(error);
            alert("Failed to load total balance.");
        }
    }

    let chart;

    function drawChart(data) {
        const ctx = document.getElementById('chart').getContext('2d');

        if (chart) chart.destroy();

        const labels = Object.keys(data);
        const values = Object.values(data);

        const total = values.reduce((a, b) => a + b, 0);

        const colors = [
            '#1f2937',   // dark
            '#3b82f6',   // blue
            '#d1d5db'    // gray
        ];

        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: colors
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '70%',
                plugins: {
                    legend: { display: false }
                }
            },
            plugins: [{
                id: 'centerText',
                beforeDraw(chart) {
                    const { width } = chart;
                    const { height } = chart;
                    const ctx = chart.ctx;

                    ctx.restore();

                    ctx.font = '12px sans-serif';
                    ctx.fillStyle = '#666';
                    ctx.textAlign = 'center';
                    ctx.fillText('Assets', width / 2, height / 2 - 10);

                    ctx.font = 'bold 18px sans-serif';
                    ctx.fillStyle = '#111';
                    ctx.fillText(values.length, width / 2, height / 2 + 15);

                    ctx.save();
                }
            }]
        });

        // ===== 右侧 legend =====
        const legendDiv = document.getElementById('legend');
        legendDiv.innerHTML = '';

        labels.forEach((label, i) => {
            const percent = total === 0 ? 0 : ((values[i] / total) * 100).toFixed(0);

            legendDiv.innerHTML += `
                <div class="legend-item">
                    <div class="legend-left">
                        <div class="legend-color" style="background:${colors[i]}"></div>
                        ${label}
                    </div>
                    <div>${percent}%</div>
                </div>
            `;
        });
    }

    async function searchTicker() {
        const keyword = document.getElementById("ticker").value;

        if (keyword.length < 1) {
            document.getElementById("suggestions").innerHTML = "";
            return;
        }

        const res = await fetch(API + "/stocks/search?q=" + keyword);
        const data = await res.json();

        const box = document.getElementById("suggestions");
        box.innerHTML = "";

        data.slice(0,5).forEach(item => {
            const div = document.createElement("div");
            div.style.cursor = "pointer";
            div.style.padding = "6px";

            div.innerText = item.symbol + " - " + item.description;

            div.onclick = () => {
                document.getElementById("ticker").value = item.symbol;
                box.innerHTML = "";
            };

            box.appendChild(div);
        });
    }

    async function addAsset() {
        const tickerInput = document.getElementById("ticker");
        const quantityInput = document.getElementById("quantity");
        const typeInput = document.getElementById("type");

        const ticker = tickerInput.value.trim().toUpperCase();
        const quantity = Number(quantityInput.value);
        const type = typeInput.value.trim();

        if (!ticker) {
            alert("Please enter a ticker.");
            return;
        }

        if (!type) {
            alert("Please enter an asset type.");
            return;
        }

        if (!isPositiveInteger(quantity)) {
            alert("Quantity must be a positive integer.");
            return;
        }

        try {
            const res = await fetch(API + "/portfolio", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    ticker: ticker,
                    quantity: quantity,
                    type: type
                })
            });

            if (!res.ok) {
                const message = await res.text();
                throw new Error(message || "Add asset failed");
            }

            tickerInput.value = "";
            quantityInput.value = "";
            typeInput.value = "";
            loadPortfolio();
        } catch (error) {
            console.error(error);
            alert(error.message || "Failed to add asset.");
        }
    }

    async function sellAsset(id, currentQuantity) {
        const sellInput = document.getElementById("sell-" + id);
        const sellQuantity = Number(sellInput.value);

        if (!isPositiveInteger(sellQuantity)) {
            alert("Sell quantity must be a positive integer.");
            return;
        }

        if (sellQuantity > currentQuantity) {
            alert("Sell quantity cannot be greater than current holdings.");
            return;
        }

        try {
            const res = await fetch(API + "/portfolio/sell", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    id: id,
                    quantity: sellQuantity
                })
            });

            if (!res.ok) {
                const message = await res.text();
                throw new Error(message || "Sell asset failed");
            }

            loadPortfolio();
        } catch (error) {
            console.error(error);
            alert(error.message || "Failed to sell asset.");
        }
    }

    loadPortfolio();
</script>

</body>
</html>
